<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rollball Match Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid py-4">

    <h1 class="text-center mb-4">
         Nashik Rollball Match Management System
    </h1>

    <!-- Scoreboard -->

   <div class="row g-3">

        <!-- Team A -->
        <div class="col-6 col-lg-4 order-1">
            <div class="card bg-dark text-white h-100 shadow">
                <div class="card-body text-center">

                    <input
                        type="text"
                        id="teamAInput"
                        class="form-control text-center fw-bold mb-3"
                        value="Team A"
                        oninput="updateTeamNames()">

                    <div class="display-1 score" id="scoreA">0</div>

                    <button class="btn btn-success w-100 mb-2"
                            onclick="goalA()">
                        + Goal
                    </button>

                    <button class="btn btn-danger w-100"
                            onclick="minusGoalA()">
                        - Goal
                    </button>

                </div>
            </div>
        </div>

        <!-- Team B -->
        <div class="col-6 col-lg-4 order-2 order-lg-3">
            <div class="card bg-dark text-white h-100 shadow">
                <div class="card-body text-center">

                   <input
                        type="text"
                        id="teamBInput"
                        class="form-control text-center fw-bold mb-3"
                        value="Team B"
                        oninput="updateTeamNames()">

                    <div class="display-1 score" id="scoreB">0</div>

                    <button class="btn btn-success w-100 mb-2"
                            onclick="goalB()">
                        + Goal
                    </button>

                    <button class="btn btn-danger w-100"
                            onclick="minusGoalB()">
                        - Goal
                    </button>

                </div>
            </div>
        </div>

         <!-- Timer -->
        <div class="col-12 col-lg-4 order-3 order-lg-2">
            <div class="card bg-dark text-white h-100 shadow">
                <div class="card-body text-center">

                    <h4>Match Time (Minutes)</h4>

                    <input
                        type="number"
                        id="minutesInput"
                        class="form-control text-center mb-3"
                        value="15"
                        min="1"
                        onchange="setMatchTime()">

                    <div class="display-3 text-success mb-3"
                        id="timer">
                        15:00
                    </div>

                    <button class="btn btn-success"
                            onclick="startTimer()">
                        Start
                    </button>

                    <button class="btn btn-warning"
                            onclick="pauseTimer()">
                        Pause
                    </button>

                    <button class="btn btn-danger"
                            onclick="resetTimer()">
                        Reset
                    </button>

                </div>
            </div>
        </div>

    </div>

    <!-- Foul Entry -->

   <div class="row mt-4 g-4">

    <!-- Team A Fouls -->
        <div class="col-md-6">

            <div class="card bg-dark text-white h-100">

                <div class="card-body">

                    <h3 class="text-center mb-3" id="teamAFoulTitle">
                        Team A Foul Entry
                    </h3>

                    <input type="text"
                        class="form-control mb-3"
                        id="playerNumberA"
                        placeholder="Player Number">

                    <button class="btn btn-warning w-100"
                            onclick="addFoulA()">
                        Add Team A Foul
                    </button>

                    <hr>

                    <ul id="teamAFoulList" class="list-group mt-2"></ul>

                </div>

            </div>

        </div>

        <!-- Team B Fouls -->
        <div class="col-md-6">

            <div class="card bg-dark text-white h-100">

                <div class="card-body">

                    <h3 class="text-center mb-3" id="teamBFoulTitle">
                        Team B Foul Entry
                    </h3>

                    <input type="text"
                        class="form-control mb-3"
                        id="playerNumberB"
                        placeholder="Player Number">

                    <button class="btn btn-warning w-100"
                            onclick="addFoulB()">
                        Add Team B Foul
                    </button>

                    <hr>

                    <ul id="teamBFoulList" class="list-group mt-2"></ul>

                </div>

            </div>

        </div>

    </div>

    <!-- Team Fouls -->

    <div class="row mt-4 g-4">

        <div class="col-md-6">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h3 id="teamAFoulsTitle">Team A Fouls</h3>

                    <div class="display-4"
                         id="teamAFouls">
                        0
                    </div>

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h3 id="teamBFoulsTitle">Team B Fouls</h3>

                    <div class="display-4"
                         id="teamBFouls">
                        0
                    </div>

                </div>

            </div>

        </div>

    </div>
    <div class="row mt-4 g-4">

        <div class="col-md-6">
            <div class="card bg-dark text-white">
                <div class="card-body">
                    <h4 id="teamAPlayersTitle">Team A Players</h4>
                    <ul id="teamAPlayers"></ul>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card bg-dark text-white">
                <div class="card-body">
                    <h4 id="teamBPlayersTitle">Team B Players</h4>
                    <ul id="teamBPlayers"></ul>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
